name: Format hardening branch

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'agent/v0.1.2-security-hardening' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/v0.1.2-security-hardening
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format
      - name: Capture type and test diagnostics
        shell: bash
        run: |
          {
            echo '=== TYPECHECK ==='
            npm run typecheck || true
            echo
            echo '=== TESTS ==='
            npm run test:run || true
          } > hardening-diagnostics.txt 2>&1
      - name: Commit formatting and diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes required."
            exit 0
          fi
          git commit -m "Capture security hardening diagnostics"
          git push
