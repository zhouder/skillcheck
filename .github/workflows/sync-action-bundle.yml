name: Sync Action bundle

on:
  push:
    branches: [agent/sync-action-bundle]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/sync-action-bundle
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:action
      - name: Commit regenerated bundle
        shell: bash
        run: |
          if git diff --quiet -- dist/action/index.js; then
            echo "Action bundle is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/action/index.js
          git commit -m "Regenerate Action bundle"
          git push
