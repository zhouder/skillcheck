name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run build:all
      - name: Verify the committed Action bundle is current
        run: git diff --exit-code -- dist/action/index.js
      - run: node dist/cli.js examples/csv-review
      - run: npm run package:check
      - name: Verify the packed npm artifact installs and runs
        shell: bash
        run: |
          mkdir -p .tmp/package .tmp/install
          npm pack --pack-destination .tmp/package
          npm install --prefix .tmp/install .tmp/package/*.tgz
          node .tmp/install/node_modules/@zhouder/skillcheck/dist/cli.js --version
          node --input-type=module -e "const pkg = await import('./.tmp/install/node_modules/@zhouder/skillcheck/dist/index.js'); if (typeof pkg.analyze !== 'function') process.exit(1)"
      - run: node dist/cli.js --version

  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:all
      - id: local-action
        name: Run the local Action through action.yml
        uses: ./
        with:
          path: examples/csv-review
          fail-on: warning
          sarif-file: .tmp/local-action.sarif
      - name: Verify local Action outputs
        shell: bash
        env:
          SCORE: ${{ steps.local-action.outputs.score }}
          SKILLS: ${{ steps.local-action.outputs.skills }}
          ERRORS: ${{ steps.local-action.outputs.errors }}
          WARNINGS: ${{ steps.local-action.outputs.warnings }}
        run: |
          test "$SCORE" = "100"
          test "$SKILLS" = "1"
          test "$ERRORS" = "0"
          test "$WARNINGS" = "0"
          test -s .tmp/local-action.sarif
      - id: valid
        name: Run the bundled Action against a valid skill
        continue-on-error: true
        shell: bash
        env:
          INPUT_PATH: examples/csv-review
          INPUT_FAIL-ON: warning
          INPUT_SARIF-FILE: .tmp/skillcheck.sarif
        run: |
          mkdir -p .tmp
          export GITHUB_OUTPUT="$PWD/.tmp/valid-output"
          export GITHUB_STEP_SUMMARY="$PWD/.tmp/valid-summary"
          : > "$GITHUB_OUTPUT"
          : > "$GITHUB_STEP_SUMMARY"
          node dist/action/index.js
      - name: Verify successful Action outcome
        if: always()
        shell: bash
        env:
          OUTCOME: ${{ steps.valid.outcome }}
        run: test "$OUTCOME" = "success"
      - name: Verify Action report files
        if: always()
        shell: bash
        run: |
          test -s .tmp/valid-output
          test -s .tmp/valid-summary
          test -s .tmp/skillcheck.sarif
      - name: Verify Action output keys
        if: always()
        shell: bash
        run: |
          grep -Eq '^score(=|<<)' .tmp/valid-output
          grep -Eq '^skills(=|<<)' .tmp/valid-output
          grep -Eq '^errors(=|<<)' .tmp/valid-output
          grep -Eq '^warnings(=|<<)' .tmp/valid-output
      - name: Verify clean Action score
        if: always()
        shell: bash
        run: grep -q '100' .tmp/valid-output
      - id: invalid
        name: Run the bundled Action against an invalid skill
        continue-on-error: true
        shell: bash
        env:
          INPUT_PATH: tests/fixtures/action-invalid
          INPUT_FAIL-ON: error
          INPUT_SARIF-FILE: ""
        run: |
          export GITHUB_OUTPUT="$PWD/.tmp/invalid-output"
          export GITHUB_STEP_SUMMARY="$PWD/.tmp/invalid-summary"
          : > "$GITHUB_OUTPUT"
          : > "$GITHUB_STEP_SUMMARY"
          node dist/action/index.js
      - name: Verify findings fail the Action
        shell: bash
        env:
          OUTCOME: ${{ steps.invalid.outcome }}
        run: test "$OUTCOME" = "failure"
