name: Sync hardening Action bundle

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'agent/v0.1.2-security-hardening' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/v0.1.2-security-hardening
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:action
      - name: Commit regenerated bundle
        shell: bash
        run: |
          if git diff --quiet -- dist/action/index.js; then
            echo "Action bundle is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/action/index.js
          git commit -m "Regenerate hardened Action bundle"
          git push
